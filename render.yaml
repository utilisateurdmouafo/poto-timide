services:
  - type: web
    name: poto-timide
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: SESSION_SECRET
        generateValue: true
      - key: POTO_SYNC_SECRET
        value: poto-sync-7f3a9c2e1b8d4f6a